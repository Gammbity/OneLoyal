services:
  api:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    command: alembic upgrade head
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    command: sh -c "npm ci && npm run dev -- --host"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneloyal}
      POSTGRES_USER: ${POSTGRES_USER:-oneloyal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneloyal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
